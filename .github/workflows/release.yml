name: releasing

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify version constant matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CONST="$(sed -n 's/^const Version = "\(.*\)"/\1/p' version.go)"
          if [ "$TAG" != "$CONST" ]; then
            echo "::error::Tag v${TAG} does not match version.go (${CONST}). Update the Version constant before releasing."
            exit 1
          fi

  goreleaser:
    needs: version-check
    permissions:
      contents: write  # for goreleaser/goreleaser-action to create a GitHub release
    runs-on: ubuntu-latest
    steps:

      - name: Check out the source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Avoid running against a shallow clone

      - name: Force fetch upstream tags
        run: git fetch --force --tags

      - name: Set up Go 1.24
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
            go-version: 1.24
            check-latest: true

      - name: Release
        uses: goreleaser/goreleaser-action@5742e2a039330cbb23ebf35f046f814d4c6ff811 # v5.1.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}